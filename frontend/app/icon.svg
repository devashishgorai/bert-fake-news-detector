  <path d="M166 135L166 155" stroke="#A7F3D0" stroke-width="10" stroke-linecap="round" />

  <circle cx="182" cy="82" r="14" fill="#22D3EE" fill-opacity="0.95" filter="url(#outerGlow)" />
  <circle cx="182" cy="82" r="4" fill="#ECFEFF" />
