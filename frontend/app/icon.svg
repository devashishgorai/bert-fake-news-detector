    <rect x="44" y="48" width="168" height="160" rx="34" fill="url(#cardGradient)" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.16" />
  </g>

  <g filter="url(#outerGlow)">
    <path
      d="M82 84C82 76.268 88.268 70 96 70H158C165.732 70 172 76.268 172 84V172C172 179.732 165.732 186 158 186H96C88.268 186 82 179.732 82 172V84Z"
