<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fake News Detector icon">
  <defs>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(128 92) rotate(90) scale(108)">
      <stop offset="0%" stop-color="#67E8F9" stop-opacity="1" />
      <stop offset="45%" stop-color="#38BDF8" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="cardGradient" x1="52" y1="44" x2="204" y2="212" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E2E8F0" />
      <stop offset="1" stop-color="#94A3B8" />
    </linearGradient>
    <linearGradient id="markGradient" x1="78" y1="82" x2="178" y2="172" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A7F3D0" />
      <stop offset="0.52" stop-color="#22D3EE" />
      <stop offset="1" stop-color="#818CF8" />
    </linearGradient>
    <filter id="outerGlow" x="-40%" y="-40%" width="180%" height="180%">
