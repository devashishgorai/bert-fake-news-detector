      stroke="url(#markGradient)"
      stroke-width="8"
      stroke-linejoin="round"
    />
  </g>

  <path d="M98 96H158" stroke="#E2E8F0" stroke-width="10" stroke-linecap="round" />
  <path d="M98 122H150" stroke="#C4B5FD" stroke-width="10" stroke-linecap="round" />
  <path d="M98 148H142" stroke="#67E8F9" stroke-width="10" stroke-linecap="round" />
